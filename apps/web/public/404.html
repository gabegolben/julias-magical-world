<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Julia's Magical World</title>
<script>
  // GitHub Pages fallback: send lost visitors back to the site root
  // (first path segment = repo base path on project pages).
  (function () {
    var seg = location.pathname.split("/")[1] || "";
    location.replace("/" + (seg ? seg + "/" : ""));
  })();
</script>
</head>

</html>
